<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechyHub - Register</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4f3;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    .card {
      display: flex;
      width: 820px;
      min-height: 480px;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.13);
    }

    /* LEFT PANEL */
    .panel-left {
      background: #1a7a6a;
      width: 280px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      padding: 2rem 1.75rem;
      position: relative;
    }

    .logo {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1px;
    }

    .logo span {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #fff;
      border-radius: 50%;
      margin-left: 2px;
      vertical-align: super;
    }

    .illustration {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .illustration svg {
      width: 160px;
      opacity: 0.18;
    }

    .tagline {
      color: #fff;
      font-size: 22px;
      font-weight: 600;
      line-height: 1.3;
    }

    /* RIGHT PANEL */
    .panel-right {
      flex: 1;
      background: #fff;
      padding: 2.5rem 2.5rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .panel-right h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .panel-right .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 1.5rem;
    }

    .form-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      flex: 1;
      margin-bottom: 10px;
    }

    label {
      font-size: 11px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      padding: 9px 12px;
      border: 1px solid #dde3e0;
      border-radius: 7px;
      font-size: 13px;
      color: #1a1a1a;
      background: #f8faf9;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: #1a7a6a;
      box-shadow: 0 0 0 3px rgba(26,122,106,0.12);
      background: #fff;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .checkbox-row input[type="checkbox"] {
      accent-color: #1a7a6a;
      width: 15px;
      height: 15px;
      cursor: pointer;
    }

    .checkbox-row label {
      font-size: 12px;
      color: #666;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 400;
      cursor: pointer;
    }

    .checkbox-row a {
      color: #1a7a6a;
      text-decoration: none;
      font-weight: 600;
    }

    .btn-register {
      width: 100%;
      padding: 11px;
      background: #1a7a6a;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      letter-spacing: 0.3px;
    }

    .btn-register:hover {
      background: #155f54;
    }

    .form-footer {
      text-align: center;
      margin-top: 14px;
      font-size: 12.5px;
      color: #888;
    }

    .form-footer a {
      color: #1a7a6a;
      text-decoration: none;
      font-weight: 600;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 8px;
      font-size: 12px;
      color: #aaa;
      text-decoration: none;
    }

    .back-link:hover { color: #1a7a6a; }

    @media (max-width: 640px) {
      .card { flex-direction: column; width: 95vw; }
      .panel-left { width: 100%; min-height: 140px; padding: 1.5rem; }
      .illustration { display: none; }
    }
  </style>
</head>
<body>

<div class="card">

  <!-- LEFT PANEL -->
  <div class="panel-left">
    <div class="logo">co<span></span></div>

    <div class="illustration">
      <svg viewBox="0 0 160 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="10" y="10" width="140" height="100" rx="10" fill="white"/>
        <rect x="25" y="25" width="50" height="50" rx="4" fill="#ccc"/>
        <rect x="85" y="25" width="55" height="8" rx="3" fill="#ddd"/>
        <rect x="85" y="40" width="40" height="6" rx="3" fill="#ddd"/>
        <rect x="85" y="55" width="48" height="6" rx="3" fill="#ddd"/>
        <rect x="25" y="85" width="115" height="12" rx="4" fill="#ddd"/>
      </svg>
    </div>

    <div class="tagline">Let's Make It<br>Happen Together!</div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel-right">
    <h1>Create An Account</h1>
    <p class="subtitle">Join TechyHub today — it's free</p>

    <div class="form-row">
      <div class="form-group">
        <label for="firstName">First Name</label>
        <input type="text" id="firstName" placeholder="Juan">
      </div>
      <div class="form-group">
        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" placeholder="Dela Cruz">
      </div>
    </div>

    <div class="form-group">
      <label for="registerEmail">Email Address</label>
      <input type="email" id="registerEmail" placeholder="juan@example.com">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="registerPassword">Password</label>
        <input type="password" id="registerPassword" placeholder="••••••••">
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="••••••••">
      </div>
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="terms">
      <label for="terms">I agree to the <a href="#">Terms & Conditions</a></label>
    </div>

    <button class="btn-register" onclick="registerUser()">Register</button>

    <p class="form-footer">
      Already have an account? <a href="login.html">Login Here</a>
    </p>
    <a class="back-link" href="index.html">← Back to Home</a>
  </div>

</div>

<script src="js/script.js" defer></script>
</body>
</html>
